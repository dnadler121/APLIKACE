<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Občanka - výsledek</title>
    <link rel="stylesheet" href="{{ url_for('obcanka.static', filename='style.css') }}">
</head>
<body>
<div class="page center">
    <div class="box result-box">
        <h1>Výsledek testu</h1>

        <div class="result-grid">
            <div><strong>Příjmení:</strong> {{ result.surname }}</div>
            <div><strong>Body:</strong> {{ result.score }} / {{ result.total }}</div>
            <div><strong>Procenta:</strong> {{ result.percent }} %</div>
            <div><strong>Známka:</strong> {{ result.grade }}</div>
        </div>

        <form method="post">
            <button type="submit">Poslat výsledek učiteli na e-mail</button>
        </form>

        {% if email_message %}
            <div class="info">{{ email_message }}</div>
        {% endif %}

        <p class="small">E-mail učitele: {{ teacher_email }}</p>

        <a class="restart" href="{{ url_for('obcanka.restart') }}">Nový test</a>
    </div>
</div>
</body>
</html>
